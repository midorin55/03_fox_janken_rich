<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>江戸じゃんけん「東八拳」バトル</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="app">

    <h1>江戸じゃんけん「東八拳」バトル</h1>

    <p class="subtitle">「東八拳」ルールブック</p>

    <div class="rule-box">

      <p>
        東八拳は、江戸時代末期に流行した
        「狐・鉄砲・庄屋」の3種類の手を使った
        「三すくみ」の拳遊びです。
      </p>

      <p>
        じゃんけんに似た遊びで、
        3回連続で勝つと「1本」です。
      </p>

      <hr>

      <h3>三すくみの関係</h3>

      <p>狐（手を耳に添える）：庄屋に勝つ</p>
      <p>庄屋（両手を膝に置く）：鉄砲に勝つ</p>
      <p>鉄砲（胸前で鉄砲を構える）：狐に勝つ</p>

      <div class="rule-image-wrap">
        <img
          src="img/tohakken-rule.png"
          alt="東八拳ルール"
          class="rule-image"
        >
      </div>

    </div>

    <button id="startBtn">
      勝負開始
    </button>

    <div class="game">

      <p class="enemy-title">
        相手の手：
        <span id="enemyHand">？</span>
      </p>

      <p class="guide">
        あなたの手を選んでください
      </p>

      <div class="buttons">

        <button class="handBtn fox" data-hand="狐">
          狐
        </button>

        <button class="handBtn shoya" data-hand="庄屋">
          庄屋
        </button>

        <button class="handBtn gun" data-hand="鉄砲">
          鉄砲
        </button>

      </div>

      <p id="result">
        結果がここに出ます
      </p>

      <div class="status">

        <p>
          連勝：
          <span id="combo">0</span>
        </p>

        <p>
          HP：
          <span id="hp">3</span>
        </p>

      </div>

    </div>

    <div class="game-over">

      <h2>ゲーム終了</h2>

      <button id="restartBtn">
        もう一度遊ぶ
      </button>

    </div>

  </div>

  <!-- 音声ファイル -->
  <audio id="startSound" src="audio/start.mp3"></audio>
  <audio id="foxSound" src="audio/fox.mp3"></audio>
  <audio id="shoyaSound" src="audio/shoya.mp3"></audio>
  <audio id="gunSound" src="audio/gun.mp3"></audio>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
